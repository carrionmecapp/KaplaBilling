<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="34" fill="url(#ring-grad)" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>

  <!-- Outer signal ring -->
  <circle cx="40" cy="40" r="34" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Lightning bolt icon -->
  <g filter="url(#glow)" transform="translate(40,40)">
    <polygon points="-7,-18 2,-2 -3,-2 7,18 -2,2 3,2" fill="url(#bolt-grad)"/>
  </g>

  <!-- SIP signal arcs left -->
  <path d="M 13 28 Q 6 40 13 52" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 7 22 Q -3 40 7 58"  fill="none" stroke="#3b82f6" stroke-width="1"   stroke-linecap="round" opacity="0.3"/>

  <!-- SIP signal arcs right -->
  <path d="M 67 28 Q 74 40 67 52" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 73 22 Q 83 40 73 58"  fill="none" stroke="#3b82f6" stroke-width="1"   stroke-linecap="round" opacity="0.3"/>

  <!-- KaplaBilling text -->
  <text x="92" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" letter-spacing="-1" fill="#3b82f6">Kapla</text>
  <text x="185" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" letter-spacing="-1" fill="#ffffff">Billing</text>

  <!-- Tagline -->
  <text x="92" y="56" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="400" letter-spacing="1.5" fill="#64748b">SIP CLASS 4/5 PLATFORM</text>

  <!-- KPBTec badge -->
  <text x="92" y="72" font-family="Inter, -apple-system, sans-serif" font-size="8.5" font-weight="500" fill="#374151" letter-spacing="0.3">KPBTec · Knowledge, Protection &amp; Business Technology</text>
</svg>
