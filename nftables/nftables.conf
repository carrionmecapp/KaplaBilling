#!/usr/sbin/nft -f
# SKTCOD SIP Platform — nftables base
# Los __PLACEHOLDER__ son reemplazados por install.sh via sed
# NO editar directamente — usar panel admin para carriers/clientes

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state established,related accept

        # LAN siempre permitida
        ip saddr __PRIVATE_NET__ accept

        # SSH solo desde IP de gestión (puerto detectado de sshd en install-time)
        ip saddr __MGMT_IP__ tcp dport __SSH_PORT__ accept
        ip saddr 38.253.149.127 tcp dport __SSH_PORT__ accept

        # Web platform (admin + portal cliente)
        tcp dport __WEB_PORT__ accept

        # RTPEngine control (solo local)
        ip saddr 127.0.0.1 udp dport 2223 accept

        # Reglas manuales: DENYs y ALLOWs por puerto específico (antecede a carriers)
        include "/etc/nftables.d/manual_rules.nft"

        # Carriers SIP + RTP (generado por gen_nftables.py)
        include "/etc/nftables.d/carriers.nft"

        # Clientes SIP + RTP (generado por gen_nftables.py)
        include "/etc/nftables.d/customers.nft"

        # ICMP básico
        icmp type echo-request limit rate 5/second accept
        icmp type { echo-reply, destination-unreachable, time-exceeded, parameter-problem } accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
