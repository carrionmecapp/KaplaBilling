# SKTCOD SIP Platform — Nginx config
# Los __PLACEHOLDER__ son reemplazados por install.sh via sed
# NO editar directamente en producción — editar este archivo y reinstalar

limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=60r/m;
limit_req_zone  $binary_remote_addr zone=login_limit:2m  rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen __WEB_PORT__;
    server_name __DOMAIN__;

    access_log /var/log/nginx/kaplabilling.access.log combined buffer=16k;
    error_log  /var/log/nginx/kaplabilling.error.log warn;

    client_max_body_size  10M;
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          60s;
    keepalive_timeout     65s;
    server_tokens         off;

    limit_conn conn_limit 50;

    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Rate limit estricto en login (anti brute-force)
    location = /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }

    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Assets estáticos Next.js servidos directo desde disco (sin pasar por Node.js)
    location /_next/static/ {
        alias __INSTALL_DIR__/frontend/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
    }

    # Bloquear archivos sensibles
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }
}
