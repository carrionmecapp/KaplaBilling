# =============================================================================
# SKTCOD SIP Platform — Metadatos del release
#
# Este archivo define la identidad y versión de la plataforma.
# El instalador (install.sh) lo lee al inicio — cambiar aquí afecta
# banners, nombres en la DB, valores por defecto, etc.
#
# Para re-brandear: cambiar PLATFORM_NAME, PLATFORM_SHORT, PLATFORM_VERSION.
# Para nuevo release: incrementar PLATFORM_VERSION.
# =============================================================================

# Nombre completo (aparece en banners, DB, emails)
PLATFORM_NAME="KAPLABILLING"

# Nombre corto (usado en prompts, etiquetas)
PLATFORM_SHORT="KPB"

# Versión actual — incrementar en cada release
PLATFORM_VERSION="2.2"

# Valores por defecto sugeridos al instalar
DEFAULT_DOMAIN="kaplabilling.pkbtec.com"
DEFAULT_WEB_PORT="7666"
DEFAULT_MGMT_IP="10.100.254.1"

# Soporte (informativo — aparece en el resumen final)
PLATFORM_SUPPORT_URL="https://kaplabilling.pkbtec.com"
