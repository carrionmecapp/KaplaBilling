[rtpengine]
table               = 0
interface           = priv/__PRIVATE_IP__;pub/__PUBLIC_IP__
listen-ng           = 127.0.0.1:2223
listen-cli          = 127.0.0.1:9901
port-min            = 20000
port-max            = 40000
log-level           = 4
log-facility        = local0

# Performance tuning v2.0
num-threads         = 0       # 0 = auto-detect CPU cores
receive-buffer-size = 4194304 # 4 MB — previene drops en bursts de RTP
max-sessions        = 500     # cap explícito contra resource exhaustion
timeout             = 60      # segundos sin RTP antes de liberar stream
silent-timeout      = 3600    # streams con RTP unidireccional (hold music)
